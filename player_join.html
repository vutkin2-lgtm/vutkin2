<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Unanimous Player</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
body{margin:0;padding:0;background:#0d0d0d;font-family:Arial,sans-serif;color:#f7d000;text-align:center}
.container{max-width:420px;margin:auto;padding:20px}
h1{font-size:32px;font-weight:900;margin-bottom:20px}
input,select{width:100%;padding:14px;font-size:18px;margin:12px 0;background:#222;color:#f7d000;border:2px solid #f7d000;border-radius:8px}
.btn{border:3px solid #f7d000;padding:14px 0;margin:12px 0;border-radius:10px;font-size:20px;font-weight:bold;text-decoration:none;color:#f7d000;display:block;cursor:pointer}
.btn:hover{box-shadow:0 0 12px #f7d000;transform:scale(1.03)}
.panel{border:3px solid #f7d000;border-radius:10px;padding:20px;margin-top:25px;text-align:left}
.question{font-size:20px;color:#fff;margin-bottom:10px}
.label{font-size:18px;color:#f7d000;margin-bottom:6px}
</style>
</head>
<body>

<div class="container">

    <h1>JOIN GAME</h1>

    <div id="joinSection">
        <input id="playerName" placeholder="Enter your name">
        <select id="teamDropdown"></select>
        <a class="btn" onclick="joinGame()">JOIN</a>
    </div>

    <div id="gameSection" style="display:none;">
        <h2 id="teamLabel"></h2>
        <div class="panel">
            <div class="label">Topic</div>
            <div id="topicText" class="question"></div>

            <div class="label">Question</div>
            <div id="questionText" class="question"></div>
        </div>
    </div>

</div>

<script>
const REPO_OWNER="vutkin2-lgtm";
const REPO_NAME="vutkin2";
const FILE_GAME="game_state.json";
const FILE_TEAMS="teams.json";

let playerName="";
let playerTeam="";

/* Fetch helper */
async function fetchJson(path){
    const url=`https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${path}?t=${Date.now()}`;
    const res=await fetch(url);
    return await res.json();
}

/* Load teams into dropdown */
async function loadTeams(){
    const data=await fetchJson(FILE_TEAMS);
    const dd=document.getElementById("teamDropdown");
    dd.innerHTML="";
    data.teams.forEach(t=>{
        const opt=document.createElement("option");
        opt.value=t.name;
        opt.textContent=t.name;
        dd.appendChild(opt);
    });
}

/* Player joins */
function joinGame(){
    playerName=document.getElementById("playerName").value.trim();
    playerTeam=document.getElementById("teamDropdown").value;

    if(!playerName){
        alert("Enter your name");
        return;
    }

    document.getElementById("joinSection").style.display="none";
    document.getElementById("gameSection").style.display="block";
    document.getElementById("teamLabel").textContent="Team: "+playerTeam;

    startPolling();
}

/* Poll game state every 2 seconds */
async function startPolling(){
    updateScreen();
    setInterval(updateScreen,2000);
}

/* Update topic + question */
async function updateScreen(){
    const game=await fetchJson(FILE_GAME);

    if(!game.is_game_in_progress){
        document.getElementById("topicText").textContent="Waiting for host...";
        document.getElementById("questionText").textContent="";
        return;
    }

    const topic=game.current_topic;
    const index=game.current_question_index;
    const questions=game.questions.filter(q=>q.topic===topic);
    const q=questions[index];

    document.getElementById("topicText").textContent=topic;
    document.getElementById("questionText").textContent=q.question;
}

/* Init */
loadTeams();
</script>

</body>
</html>
