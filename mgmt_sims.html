<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unanimous Game</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #0d0d0d;
        font-family: Arial, sans-serif;
        color: #f7d000;
        animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .container {
        width: 100%;
        max-width: 480px;
        margin: auto;
        padding: 20px;
        text-align: center;
    }

    /* HOME ICON — CIRCLE WITH YELLOW BACKGROUND */
    .home-icon {
        width: 42px;
        height: 42px;
        background: #f7d000;
        color: #000000;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 22px;
        font-weight: bold;
        cursor: pointer;
        margin-bottom: 10px;
    }

    h1 {
        font-size: 36px;
        font-weight: 900;
        margin-bottom: 25px;
        letter-spacing: 2px;
    }

    .btn {
        border: 3px solid #f7d000;
        padding: 14px 0;
        margin: 12px 0;
        border-radius: 10px;
        font-size: 20px;
        font-weight: bold;
        text-decoration: none;
        color: #f7d000;
        display: block;
        transition: 0.25s;
    }

    .btn:hover {
        box-shadow: 0 0 12px #f7d000;
        transform: scale(1.03);
    }

    /* QUESTION PANEL */
    .panel {
        border: 3px solid #f7d000;
        border-radius: 10px;
        padding: 20px;
        margin-top: 25px;
        text-align: left;
        position: relative;
    }

    .panel-title {
        position: absolute;
        top: -14px;
        left: 12px;
        background: #0d0d0d;
        padding: 0 8px;
        font-size: 18px;
        font-weight: bold;
        color: #ffffff;
    }

    .question {
        font-size: 18px;
        line-height: 1.4;
        margin-bottom: 15px;
        color: #ffffff;
    }

    .status-row {
        display: flex;
        justify-content: space-between;
        font-size: 18px;
        margin-bottom: 10px;
    }

    /* TIMER COLORS + BOLD */
    .timer-green { color: #00ff00; font-weight: bold; }
    .timer-yellow { color: #ffff00; font-weight: bold; }
    .timer-red { color: #ff0000; font-weight: bold; }

    @keyframes blink {
        50% { opacity: 0; }
    }
    .blink { animation: blink 1s infinite; }

    /* VOTE COLORS + BOLD */
    .vote-red { color: #ff0000; font-weight: bold; }
    .vote-yellow { color: #ffff00; font-weight: bold; }
    .vote-green { color: #00ff00; font-weight: bold; }

    /* STANDINGS */
    .standings {
        margin-top: 25px;
        text-align: left;
    }

    .team {
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
        border-bottom: 1px solid #333;
        font-size: 18px;
    }

    /* TEAM NAME WHITE, SCORE YELLOW */
    .team span:first-child {
        color: #ffffff;
    }
    .team span:last-child {
        color: #f7d000;
    }
</style>
</head>

<body>
<div class="container">

    <!-- HOME ICON -->
    <div class="home-icon" onclick="goHome()">⌂</div>

    <h1>UNANIMOUS!</h1>

    <a class="btn" onclick="nextQuestion()">LOAD GAME</a>
    <a class="btn">START GAME</a>
    <a class="btn">CONNECT TO DISPLAY</a>
    <a class="btn">CREATE TEAM</a>

    <div class="panel">
        <div class="panel-title">Question</div>

        <div id="questionText" class="question">
            Loading question...
        </div>

        <div class="status-row">
            <div id="timer" class="timer-green">00:42</div>
            <div id="votes" class="vote-red">0/24 VOTED</div>
        </div>
    </div>

    <div class="standings">
        <h2 style="font-size:24px; margin-bottom:10px;">LIVE STANDINGS</h2>

        <div class="team"><span>CYBER PUNKS</span><span>2,170</span></div>
        <div class="team"><span>GOLDEN EAGLES</span><span>1,588</span></div>
        <div class="team"><span>VOID RUNNERS</span><span>1,931</span></div>
        <div class="team"><span>NEON NOVICES</span><span>1,289</span></div>
        <div class="team"><span>ALPHA SQUAD</span><span>1,370</span></div>
    </div>

</div>

<script>
function goHome() {
    window.location.href = "https://vutkin2-lgtm.github.io/vutkin2/index.html";
}

/* ---------------------------
   JSON DATABASE LOADING
---------------------------- */

let gameState = {};
let questions = [];
let currentTopic = "";
let currentIndex = 0;
let currentPoints = { correct: 0, wrong: 0, maybe: 0 };

fetch("game_state.json")
  .then(res => res.json())
  .then(data => {
      gameState = data;
      currentTopic = data.current_topic;
      questions = data.questions;
      currentIndex = data.current_question_index;

      console.log("Loaded topic:", currentTopic);
      console.log("Loaded questions:", questions);

      loadCurrentQuestion();
  });

function loadCurrentQuestion() {
    const q = questions[currentIndex];
    if (!q) return;

    document.getElementById("questionText").textContent = q.question;

    timeLeft = q.timer_seconds;
    currentPoints = q.points;

    console.log("Current question:", q);
}

/* ---------------------------
   NEXT QUESTION BUTTON
---------------------------- */

function nextQuestion() {
    if (!questions || questions.length === 0) return;

    currentIndex++;

    if (currentIndex >= questions.length) {
        currentIndex = 0;
    }

    loadCurrentQuestion();
}

/* ---------------------------
   TIMER LOGIC
---------------------------- */

let totalTime = 42;
let timeLeft = totalTime;
const timerEl = document.getElementById("timer");

function updateTimer() {
    if (timeLeft > 0) {
        timeLeft--;

        let m = "00";
        let s = timeLeft < 10 ? "0" + timeLeft : timeLeft;
        timerEl.textContent = `${m}:${s}`;

        let fraction = timeLeft / totalTime;

        timerEl.classList.remove("timer-green", "timer-yellow", "timer-red", "blink");

        if (fraction > 2/3) {
            timerEl.classList.add("timer-green");
        } else if (fraction > 1/3) {
            timerEl.classList.add("timer-yellow");
        } else {
            timerEl.classList.add("timer-red", "blink");
        }
    }
}
setInterval(updateTimer, 1000);

/* ---------------------------
   VOTE COUNTER SIMULATION
---------------------------- */

let votes = 0;
const maxVotes = 24;
const voteEl = document.getElementById("votes");

function updateVotes() {
    if (votes < maxVotes) {
        votes++;
        voteEl.textContent = `${votes}/${maxVotes} VOTED`;

        let fraction = votes / maxVotes;

        voteEl.classList.remove("vote-red", "vote-yellow", "vote-green");

        if (fraction < 1/3) {
            voteEl.classList.add("vote-red");
        } else if (fraction < 2/3) {
            voteEl.classList.add("vote-yellow");
        } else {
            voteEl.classList.add("vote-green");
        }
    }
}

setInterval(updateVotes, 1500);
</script>

</body>
</html>
