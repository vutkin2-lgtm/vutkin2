<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Unanimous Host</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<style>
body{
    margin:0;
    padding:0;
    background:#0d0d0d;
    font-family:Arial,sans-serif;
    color:#f7d000;
}
.container{
    max-width:600px;
    margin:auto;
    padding:20px;
    text-align:center;
}
h1{
    font-size:40px;
    font-weight:900;
    margin-bottom:20px;
}
.btn{
    border:3px solid #f7d000;
    padding:16px;
    margin:12px 0;
    border-radius:10px;
    font-size:22px;
    font-weight:bold;
    color:#f7d000;
    display:block;
    cursor:pointer;
    text-decoration:none;
}
.btn:hover{
    box-shadow:0 0 12px #f7d000;
}
.btn-disabled{
    opacity:.4;
    pointer-events:none;
}
.panel{
    border:3px solid #f7d000;
    border-radius:10px;
    padding:20px;
    margin-top:25px;
    text-align:left;
}
.panel-title{
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}
.question{
    font-size:22px;
    color:#fff;
    margin-bottom:10px;
}
.correct{
    font-size:20px;
    color:#0f0;
    margin-top:10px;
}
.timer{
    font-size:32px;
    font-weight:bold;
    margin-top:15px;
}
.timer-green{color:#0f0;}
.timer-yellow{color:#ff0;}
.timer-red{color:#f00;}
.standings{
    margin-top:25px;
    text-align:left;
}
.team-row{
    display:flex;
    justify-content:space-between;
    padding:6px 0;
    border-bottom:1px solid #333;
    font-size:20px;
}
</style>
</head>

<body>
<div class="container">

    <h1>UNANIMOUS! — HOST</h1>

    <a id="loadGameBtn" class="btn">LOAD GAME</a>
    <a id="nextBtn" class="btn">NEXT QUESTION</a>

    <div class="panel">
        <div class="panel-title">Current Question</div>
        <div id="topicText" class="question"></div>
        <div id="questionText" class="question"></div>
        <div id="correctAnswer" class="correct"></div>
        <div id="timer" class="timer timer-green">00:30</div>
    </div>

    <div class="standings">
        <h2>Team Standings</h2>
        <div id="standingsList"></div>
    </div>
<script>
/* ---------------------------------------------------------
   CONFIG
--------------------------------------------------------- */
const REPO_OWNER = "vutkin2-lgtm";
const REPO_NAME  = "vutkin2";
const FILE_GAME  = "game_state.json";
const FILE_TEAMS = "teams.json";
const FILE_VOTES = "votes.json";

/* ---------------------------------------------------------
   GITHUB HELPERS
--------------------------------------------------------- */
async function fetchJson(path){
    const url = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${path}?t=${Date.now()}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error("Fetch failed: " + path);
    return await res.json();
}

async function writeJson(path, obj, message){
    const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`;

    const current = await fetch(url).then(r => r.json());
    const sha = current.sha;

    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(obj, null, 2))));

    await fetch(url, {
        method: "PUT",
        headers: {
            "Authorization": `Bearer ${GITHUB_TOKEN}`,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: message,
            content: encoded,
            sha: sha
        })
    });
}

/* ---------------------------------------------------------
   LOAD GAME STATE
--------------------------------------------------------- */
let gameState = null;
let teamsLocal = [];

async function loadGameState(){
    gameState = await fetchJson(FILE_GAME);
    return gameState;
}

async function loadTeams(){
    const data = await fetchJson(FILE_TEAMS);
    teamsLocal = data.teams || [];
    renderStandings();
}

async function loadVotes(){
    const data = await fetchJson(FILE_VOTES);
    return data.votes || [];
}

/* ---------------------------------------------------------
   RENDER STANDINGS
--------------------------------------------------------- */
function renderStandings(){
    const list = document.getElementById("standingsList");
    list.innerHTML = "";

    teamsLocal
        .sort((a,b)=>b.score - a.score)
        .forEach(team=>{
            const row = document.createElement("div");
            row.className = "team-row";
            row.innerHTML = `
                <span>${team.name}</span>
                <span>${team.score}</span>
            `;
            list.appendChild(row);
        });
}

/* ---------------------------------------------------------
   SCORING LOGIC (Majority, Tie = YES)
--------------------------------------------------------- */
async function scoreCurrentQuestion(){
    const votes = await loadVotes();
    if(!votes.length) return;

    const topic = gameState.current_topic;
    const index = gameState.current_question_index;
    const questions = gameState.questions.filter(q => q.topic === topic);
    const q = questions[index];

    const correct = q.correct_answer;

    // Group votes by team
    const grouped = {};
    votes.forEach(v=>{
        if(!grouped[v.team]) grouped[v.team] = [];
        grouped[v.team].push(v.answer);
    });

    // Score each team
    Object.keys(grouped).forEach(teamName=>{
        const answers = grouped[teamName];
        const yesCount = answers.filter(a=>"yes"===a).length;
        const noCount  = answers.filter(a=>"no"===a).length;

        // Tie = YES (your rule)
        const teamAnswer = yesCount >= noCount ? "yes" : "no";

        const team = teamsLocal.find(t=>t.name===teamName);
        if(!team) return;

        if(teamAnswer === correct){
            team.score = (team.score || 0) + 1;
        }
    });

    // Save updated scores
    await writeJson(FILE_TEAMS, {teams:teamsLocal}, "Update team scores");

    // Clear votes
    await writeJson(FILE_VOTES, {votes:[]}, "Clear votes");

    // Update standings panel
    renderStandings();
}

/* ---------------------------------------------------------
   SHOW CURRENT QUESTION + CORRECT ANSWER
--------------------------------------------------------- */
function showCurrentQuestion(){
    const topic = gameState.current_topic;
    const index = gameState.current_question_index;
    const questions = gameState.questions.filter(q => q.topic === topic);
    const q = questions[index];

    document.getElementById("topicText").textContent = topic;
    document.getElementById("questionText").textContent = q.question;
    document.getElementById("correctAnswer").textContent = "Correct Answer: " + q.correct_answer.toUpperCase();
}

/* ---------------------------------------------------------
   TIMER (visual only)
--------------------------------------------------------- */
let timerValue = 30;
let timerInterval = null;

function startTimer(seconds){
    timerValue = seconds;
    updateTimerDisplay();

    clearInterval(timerInterval);
    timerInterval = setInterval(()=>{
        timerValue--;
        if(timerValue <= 0){
            timerValue = 0;
            clearInterval(timerInterval);
        }
        updateTimerDisplay();
    }, 1000);
}

function updateTimerDisplay(){
    const el = document.getElementById("timer");
    const t = timerValue < 10 ? "0"+timerValue : timerValue;
    el.textContent = "00:" + t;

    el.className = "timer";
    if(timerValue > 20) el.classList.add("timer-green");
    else if(timerValue > 10) el.classList.add("timer-yellow");
    else el.classList.add("timer-red");
}
</script>
<script>
/* ---------------------------------------------------------
   EVENT HANDLERS + GAME FLOW
--------------------------------------------------------- */

/* LOAD GAME BUTTON */
document.getElementById("loadGameBtn").onclick = async function(){
    try{
        await loadGameState();
        await loadTeams();

        if(!gameState.current_topic){
            alert("No topic selected in game_state.json");
            return;
        }

        gameState.is_game_in_progress = true;
        gameState.current_question_index = 0;

        await writeJson(FILE_GAME, gameState, "Start game");

        showCurrentQuestion();
        startTimer(30);

        document.getElementById("loadGameBtn").classList.add("btn-disabled");
    }catch(e){
        console.error(e);
        alert("Error loading game");
    }
};

/* NEXT QUESTION BUTTON */
document.getElementById("nextBtn").onclick = async function(){
    try{
        await loadGameState();
        await loadTeams();

        // Score the question FIRST
        await scoreCurrentQuestion();

        const topic = gameState.current_topic;
        const questions = gameState.questions.filter(q => q.topic === topic);

        gameState.current_question_index++;

        // End of topic?
        if(gameState.current_question_index >= questions.length){
            alert("Topic complete. Game over.");
            gameState.is_game_in_progress = false;
            await writeJson(FILE_GAME, gameState, "End game");
            return;
        }

        // Save updated index
        await writeJson(FILE_GAME, gameState, "Next question");

        // Show next question
        showCurrentQuestion();
        startTimer(30);

    }catch(e){
        console.error(e);
        alert("Error moving to next question");
    }
};

/* ---------------------------------------------------------
   INITIALIZATION
--------------------------------------------------------- */
(async function init(){
    try{
        await loadTeams();
    }catch(e){
        console.error("Init error", e);
    }
})();
</script>

</body>
</html>

</div>
