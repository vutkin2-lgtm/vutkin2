<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unanimous Game</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #0d0d0d;
        font-family: Arial, sans-serif;
        color: #f7d000;
    }

    .container {
        width: 100%;
        max-width: 480px;
        margin: auto;
        padding: 20px;
        text-align: center;
    }

    h1 {
        font-size: 36px;
        font-weight: 900;
        margin-bottom: 25px;
        letter-spacing: 2px;
    }

    .btn {
        border: 3px solid #f7d000;
        padding: 14px 0;
        margin: 12px 0;
        border-radius: 10px;
        font-size: 20px;
        font-weight: bold;
        text-decoration: none;
        color: #f7d000;
        display: block;
    }

    .panel {
        border: 3px solid #f7d000;
        border-radius: 10px;
        padding: 20px;
        margin-top: 25px;
        text-align: left;
    }

    .question {
        font-size: 18px;
        line-height: 1.4;
        margin-bottom: 15px;
    }

    .status-row {
        display: flex;
        justify-content: space-between;
        font-size: 18px;
        margin-bottom: 10px;
    }

    .standings {
        margin-top: 25px;
        text-align: left;
    }

    .team {
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
        border-bottom: 1px solid #333;
        font-size: 18px;
    }
</style>
</head>

<body>
<div class="container">

    <h1>UNANIMOUS!</h1>

    <a class="btn">LOAD GAME</a>
    <a class="btn">START GAME</a>
    <a class="btn">CONNECT TO DISPLAY</a>
    <a class="btn">CREATE TEAM</a>

    <div class="panel">
        <div class="question">
            WHICH OF THESE CELEBRITIES IS MOST LIKELY TO SHARE A JUNGLE ADVENTURE BASED ON THEIR INSTAGRAM PAGE?
        </div>

        <div class="status-row">
            <div>00:42</div>
            <div>0/24 VOTED</div>
        </div>
    </div>

    <div class="standings">
        <h2 style="font-size:24px; margin-bottom:10px;">LIVE STANDINGS</h2>

        <div class="team"><span>CYBER PUNKS</span><span>2,170</span></div>
        <div class="team"><span>GOLDEN EAGLES</span><span>1,588</span></div>
        <div class="team"><span>VOID RUNNERS</span><span>1,931</span></div>
        <div class="team"><span>NEON NOVICES</span><span>1,289</span></div>
        <div class="team"><span>ALPHA SQUAD</span><span>1,370</span></div>
    </div>

</div>
</body>
</html>
