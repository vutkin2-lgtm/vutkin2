<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unanimous Game</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #0d0d0d;
        font-family: Arial, sans-serif;
        color: #f7d000;
        animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .container {
        width: 100%;
        max-width: 480px;
        margin: auto;
        padding: 20px;
        text-align: center;
    }

    /* HOME ICON */
    .home-icon {
        font-size: 28px;
        cursor: pointer;
        color: white;
        text-align: left;
        margin-bottom: 10px;
        width: 100%;
    }

    h1 {
        font-size: 36px;
        font-weight: 900;
        margin-bottom: 25px;
        letter-spacing: 2px;
    }

    .btn {
        border: 3px solid #f7d000;
        padding: 14px 0;
        margin: 12px 0;
        border-radius: 10px;
        font-size: 20px;
        font-weight: bold;
        text-decoration: none;
        color: #f7d000;
        display: block;
        transition: 0.25s;
    }

    .btn:hover {
        box-shadow: 0 0 12px #f7d000;
        transform: scale(1.03);
    }

    /* QUESTION PANEL */
    .panel {
        border: 3px solid #f7d000;
        border-radius: 10px;
        padding: 20px;
        margin-top: 25px;
        text-align: left;
        position: relative;
    }

    .panel-title {
        position: absolute;
        top: -14px;
        left: 12px;
        background: #0d0d0d;
        padding: 0 8px;
        font-size: 18px;
        font-weight: bold;
        color: #ffffff;
    }

    .question {
        font-size: 18px;
        line-height: 1.4;
        margin-bottom: 15px;
        color: #ffffff;
    }

    .status-row {
        display: flex;
        justify-content: space-between;
        font-size: 18px;
        margin-bottom: 10px;
    }

    /* TIMER COLORS */
    .timer-green { color: #00ff00; }
    .timer-yellow { color: #ffff00; }
    .timer-red { color: #ff0000; }

    @keyframes blink {
        50% { opacity: 0; }
    }
    .blink { animation: blink 1s infinite; }

    /* VOTE COLORS */
    .vote-red { color: #ff0000; }
    .vote-yellow { color: #ffff00; }
    .vote-green { color: #00ff00; }

    /* STANDINGS */
    .standings {
        margin-top: 25px;
        text-align: left;
    }

    .team {
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
        border-bottom: 1px solid #333;
        font-size: 18px;
    }
</style>
</head>

<body>
<div class="container">

    <!-- HOME ICON -->
    <div class="home-icon" onclick="goHome()">🏠</div>

    <h1>UNANIMOUS!</h1>

    <a class="btn">LOAD GAME</a>
    <a class="btn">START GAME</a>
    <a class="btn">CONNECT TO DISPLAY</a>
    <a class="btn">CREATE TEAM</a>

    <div class="panel">
        <div class="panel-title">Question</div>

        <div id="questionText" class="question">
            WHICH OF THESE CELEBRITIES IS MOST LIKELY TO SHARE A JUNGLE ADVENTURE BASED ON THEIR INSTAGRAM PAGE?
        </div>

        <div class="status-row">
            <div id="timer" class="timer-green">00:42</div>
            <div id="votes" class="vote-red">0/24 VOTED</div>
        </div>
    </div>

    <div class="standings">
        <h2 style="font-size:24px; margin-bottom:10px;">LIVE STANDINGS</h2>

        <div class="team"><span>CYBER PUNKS</span><span>2,170</span></div>
        <div class="team"><span>GOLDEN EAGLES</span><span>1,588</span></div>
        <div class="team"><span>VOID RUNNERS</span><span>1,931</span></div>
        <div class="team"><span>NEON NOVICES</span><span>1,289</span></div>
        <div class="team"><span>ALPHA SQUAD</span><span>1,370</span></div>
    </div>

</div>

<script>
/* HOME ICON */
function goHome() {
    window.location.href = "https://vutkin2-lgtm.github.io/vutkin2/index.html";
}

/* COUNTDOWN TIMER */
let totalTime = 42;
let timeLeft = totalTime;
const timerEl = document.getElementById("timer");

function updateTimer() {
    if (timeLeft > 0) {
        timeLeft--;

        let m = "00";
        let s = timeLeft < 10 ? "0" + timeLeft : timeLeft;
        timerEl.textContent = `${m}:${s}`;

        let fraction = timeLeft / totalTime;

        timerEl.classList.remove("timer-green", "timer-yellow", "timer-red", "blink");

        if (fraction > 2/3) {
            timerEl.classList.add("timer-green");
        } else if (fraction > 1/3) {
            timerEl.classList.add("timer-yellow");
        } else {
            timerEl.classList.add("timer-red", "blink");
        }
    }
}
setInterval(updateTimer, 1000);

/* VOTE COUNTER COLOR PROGRESSION */
let votes = 0;
const maxVotes = 24;
const voteEl = document.getElementById("votes");

function updateVotes() {
    if (votes < maxVotes) {
        votes++;
        voteEl.textContent = `${votes}/${maxVotes} VOTED`;

        let fraction = votes / maxVotes;

        voteEl.classList.remove("vote-red", "vote-yellow", "vote-green");

        if (fraction < 1/3) {
            voteEl.classList.add("vote-red");
        } else if (fraction < 2/3) {
            voteEl.classList.add("vote-yellow");
        } else {
            voteEl.classList.add("vote-green");
        }
    }
}

/* Simulate votes coming in */
setInterval(updateVotes, 1500);
</script>

</body>
</html>
